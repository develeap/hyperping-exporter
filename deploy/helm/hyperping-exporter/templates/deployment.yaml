{{- if and (not .Values.config.apiKey) (not .Values.config.existingSecret) }}
{{- fail "Either apiKey or existingSecret must be set" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hyperping-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperping-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hyperping-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hyperping-exporter.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: {{ .Values.config.metricsPath | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--listen-address=:{{ .Values.service.port }}"
            - "--metrics-path={{ .Values.config.metricsPath }}"
            - "--cache-ttl={{ .Values.config.cacheTTL }}"
            - "--log-level={{ .Values.config.logLevel }}"
            - "--log-format={{ .Values.config.logFormat }}"
            {{- if .Values.config.webConfigFile }}
            - "--web.config.file={{ .Values.config.webConfigFile }}"
            {{- end }}
            {{- if .Values.config.namespace }}
            - "--namespace={{ .Values.config.namespace }}"
            {{- end }}
            {{- if .Values.config.excludeNamePattern }}
            - {{ printf "--exclude-name-pattern=%s" .Values.config.excludeNamePattern | toJson }}
            {{- end }}
            {{- if .Values.config.mcpUrl }}
            - {{ printf "--mcp-url=%s" .Values.config.mcpUrl | toJson }}
            {{- end }}
          env:
            - name: HYPERPING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hyperping-exporter.secretName" . }}
                  key: api-key
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      terminationGracePeriodSeconds: 15
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
