{{- include "hyperping-exporter.validateNoTestKeys" . -}}
{{- include "hyperping-exporter.validateCacheTTL" . -}}
{{- include "hyperping-exporter.validateReplicaCount" . -}}
{{- include "hyperping-exporter.validateSecretSources" . -}}
{{- include "hyperping-exporter.validateWebConfigFile" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hyperping-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperping-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hyperping-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hyperping-exporter.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: {{ .Values.config.metricsPath | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - {{ include "hyperping-exporter.arg" (list "--listen-address" (printf ":%v" .Values.service.port)) }}
            - {{ include "hyperping-exporter.arg" (list "--metrics-path" .Values.config.metricsPath) }}
            - {{ include "hyperping-exporter.arg" (list "--cache-ttl" .Values.config.cacheTTL) }}
            - {{ include "hyperping-exporter.arg" (list "--log-level" .Values.config.logLevel) }}
            - {{ include "hyperping-exporter.arg" (list "--log-format" .Values.config.logFormat) }}
            {{- /*
              config.webConfigFile (TLS mode) is currently gated off by
              validateWebConfigFile (R10): the chart's probes and
              ServiceMonitor hardcode HTTP, so enabling TLS would
              produce a permanently-NotReady pod. The validator
              fail()s before this template would render the arg. The
              arg-rendering line stays out of the template until the
              chart wires httpGet.scheme + ServiceMonitor scheme +
              tlsConfig coherently.
            */}}
            {{- if .Values.config.namespace }}
            - {{ include "hyperping-exporter.arg" (list "--namespace" .Values.config.namespace) }}
            {{- end }}
            {{- if .Values.config.excludeNamePattern }}
            - {{ include "hyperping-exporter.arg" (list "--exclude-name-pattern" .Values.config.excludeNamePattern) }}
            {{- end }}
            {{- if .Values.config.mcpUrl }}
            - {{ include "hyperping-exporter.arg" (list "--mcp-url" .Values.config.mcpUrl) }}
            {{- end }}
          {{- if gt (int (include "hyperping-exporter.secretSourceCount" .)) 0 }}
          env:
            - name: HYPERPING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hyperping-exporter.secretName" . }}
                  key: api-key
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if (.Values.tmpfs | default dict).enabled }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if (.Values.tmpfs | default dict).enabled }}
      volumes:
        - name: tmp
          emptyDir:
            {{- with .Values.tmpfs.medium }}
            medium: {{ . | quote }}
            {{- end }}
            {{- with .Values.tmpfs.sizeLimit }}
            sizeLimit: {{ . | quote }}
            {{- end }}
      {{- end }}
      terminationGracePeriodSeconds: 15
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
