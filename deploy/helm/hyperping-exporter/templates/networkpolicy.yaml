{{- $fqdn := (.Values.networkPolicy.fqdnRestriction | default dict) -}}
{{- if and .Values.networkPolicy.enabled (not $fqdn.enabled) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hyperping-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperping-exporter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hyperping-exporter.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- if .Values.networkPolicy.ingressFrom }}
  ingress:
    # Allow Prometheus to scrape metrics.
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  {{- end }}
  egress:
    # Allow DNS resolution (scoped to kube-system).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to external endpoints (Hyperping API).
    # 0.0.0.0/0 with no `except:` list, per Task 7 / round-3 review decision:
    # the user's clusters may legitimately route api.hyperping.io traffic
    # via an in-cluster egress gateway that lives in a private RFC1918
    # range; the vanilla NetworkPolicy cannot enumerate every legitimate
    # private destination. Operators wanting fine-grained FQDN restriction
    # enable `networkPolicy.fqdnRestriction.enabled: true` which switches
    # to the CiliumNetworkPolicy variant.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- end }}
