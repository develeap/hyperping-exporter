{{- $fqdn := (.Values.networkPolicy.fqdnRestriction | default dict) -}}
{{- if and .Values.networkPolicy.enabled (not $fqdn.enabled) }}
{{- $dns := (.Values.networkPolicy.dns | default dict) -}}
{{- $eg := (.Values.networkPolicy.egress | default dict) -}}
{{- /* DNS podLabels fallback: empty operator value -> default kube-dns
       selector. Replace-not-merge avoids Helm's map deep-merge leaking the
       default label into overrides that target a different DNS deployment. */ -}}
{{- $dnsPodLabels := $dns.podLabels | default dict -}}
{{- if not $dnsPodLabels }}{{- $dnsPodLabels = (dict "k8s-app" "kube-dns") }}{{- end -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hyperping-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperping-exporter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hyperping-exporter.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- if .Values.networkPolicy.ingressFrom }}
  ingress:
    # Allow Prometheus to scrape metrics.
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  {{- end }}
  egress:
    # DNS resolution. Targets are operator-configurable via networkPolicy.dns
    # (default: k8s-app: kube-dns in kube-system, matching vanilla
    # kube-dns/CoreDNS deployments). See values.yaml for NodeLocal DNS and
    # managed-cluster override guidance.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $dns.namespace | default "kube-system" }}
          podSelector:
            matchLabels:
              {{- toYaml $dnsPodLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # API egress (Hyperping). Defaults block intra-cluster lateral movement by
    # excluding RFC1918 ranges; operators on in-cluster egress-gateway
    # topologies can clear `networkPolicy.egress.except` in their overlay.
    - to:
        - ipBlock:
            cidr: {{ $eg.cidr | default "0.0.0.0/0" }}
            {{- with $eg.except }}
            except:
              {{- toYaml . | nindent 14 }}
            {{- end }}
      ports:
        - protocol: TCP
          port: {{ $eg.port | default 443 }}
{{- end }}
