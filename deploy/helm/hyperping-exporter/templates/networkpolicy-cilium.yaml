{{- $fqdn := (.Values.networkPolicy.fqdnRestriction | default dict) -}}
{{- if and .Values.networkPolicy.enabled $fqdn.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "hyperping-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperping-exporter.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "hyperping-exporter.selectorLabels" . | nindent 6 }}
  {{- /*
    Ingress lockdown parity with vanilla NetworkPolicy (R8). Vanilla NP
    sets policyTypes: [Ingress, Egress] and an omitted `ingress` key
    means deny-all-ingress per K8s semantics. Cilium 1.14+ requires
    enableDefaultDeny.ingress: true to match that behaviour when the
    endpoint selector picks an endpoint that has only egress rules
    (without this flag Cilium leaves ingress unrestricted). Always set
    enableDefaultDeny.ingress: true so the Cilium variant matches the
    vanilla NP trust model regardless of whether ingressFrom is empty.
  */}}
  enableDefaultDeny:
    ingress: true
  {{- /* Ingress block is rendered only when ingressFrom is non-empty (C3.5). */}}
  {{- if .Values.networkPolicy.ingressFrom }}
  ingress:
    - fromEndpoints:
        {{- range $i, $peer := .Values.networkPolicy.ingressFrom }}
        {{- $podSel := $peer.podSelector | default dict }}
        {{- $nsSel := $peer.namespaceSelector }}
        {{- $hasPod := or $podSel.matchLabels $podSel.matchExpressions }}
        {{- /* Reject unsupported peer shapes loudly (C3.3). */}}
        {{- if $peer.ipBlock }}
        {{- fail (printf "networkPolicy.ingressFrom[%d]: ipBlock peers are not supported by the Cilium variant. Use a podSelector / namespaceSelector peer, or disable fqdnRestriction to fall back to the vanilla NetworkPolicy." $i) }}
        {{- end }}
        {{- if not (or $hasPod $nsSel) }}
        {{- fail (printf "networkPolicy.ingressFrom[%d]: peer must have a podSelector or namespaceSelector. Selector-less peers are not supported by the Cilium variant." $i) }}
        {{- end }}
        {{- /*
          Build the flattened matchLabels map: pod matchLabels + namespace
          shortcut. When the operator supplies ONLY a podSelector (no
          namespaceSelector), we MUST scope the EndpointSelector to the
          release namespace via k8s:io.kubernetes.pod.namespace (R7).
          Cilium's EndpointSelector matches across all namespaces in the
          absence of this label, which would silently widen the ingress
          trust domain compared to vanilla NetworkPolicy.from.podSelector
          (which is implicitly scoped to the policy's namespace).
        */}}
        {{- $labels := dict }}
        {{- range $k, $v := ($podSel.matchLabels | default dict) }}
        {{- $_ := set $labels $k $v }}
        {{- end }}
        {{- if not $nsSel }}
        {{- $_ := set $labels "k8s:io.kubernetes.pod.namespace" $.Release.Namespace }}
        {{- end }}
        {{- if $nsSel }}
        {{- $nsExprs := $nsSel.matchExpressions | default list }}
        {{- if $nsExprs }}
        {{- fail (printf "networkPolicy.ingressFrom[%d]: namespaceSelector.matchExpressions are not auto-converted by the Cilium variant. Cilium's EndpointSelector flattens pod and namespace labels; lift the expressions onto the peer's podSelector.matchLabels with the canonical k8s:io.kubernetes.pod.namespace.labels.<key> prefix, or disable fqdnRestriction to fall back to the vanilla NetworkPolicy." $i) }}
        {{- end }}
        {{- range $k, $v := ($nsSel.matchLabels | default dict) }}
        {{- if eq $k "kubernetes.io/metadata.name" }}
        {{- $_ := set $labels "k8s:io.kubernetes.pod.namespace" $v }}
        {{- else }}
        {{- fail (printf "networkPolicy.ingressFrom[%d]: namespaceSelector label %q is not auto-converted. The Cilium variant supports only the kubernetes.io/metadata.name well-known label. Lift this onto the peer's podSelector.matchLabels with the canonical k8s:io.kubernetes.pod.namespace.labels.<key> prefix, or disable fqdnRestriction to fall back to the vanilla NetworkPolicy." $i $k) }}
        {{- end }}
        {{- end }}
        {{- end }}
        - {{- if $labels }}
          matchLabels:
            {{- toYaml $labels | nindent 12 }}
          {{- end }}
          {{- with $podSel.matchExpressions }}
          matchExpressions:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      toPorts:
        - ports:
            - port: {{ .Values.service.port | quote }}
              protocol: TCP
  {{- end }}
  egress:
    # DNS resolution (scoped to kube-system).
    #
    # The rules.dns block under toPorts is REQUIRED for FQDN egress to
    # work on a real Cilium-enforced cluster (R5). Cilium's DNS proxy
    # only intercepts DNS queries when the egress rule that allows
    # 53/UDP+TCP explicitly opts into proxying via rules.dns. Without
    # that opt-in the proxy never observes the response, so the
    # subsequent toFQDNs rule never learns the FQDN-to-IP mapping and
    # all egress to api.hyperping.io is silently dropped.
    #
    # `matchPattern: "*"` allows the proxy to learn ANY hostname the
    # exporter resolves (the toFQDNs rule below is what restricts which
    # hosts can actually be connected to on port 443).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    # FQDN-restricted egress to api.hyperping.io (or operator-configured hosts).
    - toFQDNs:
        {{- range $host := ($fqdn.allowedHosts | default (list "api.hyperping.io")) }}
        - matchName: {{ $host | quote }}
        {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
{{- end }}
