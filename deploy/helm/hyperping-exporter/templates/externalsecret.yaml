{{- $es := .Values.externalSecret | default dict -}}
{{- if $es.enabled }}
{{- if not (and $es.secretStoreRef $es.secretStoreRef.name) }}
{{- fail "externalSecret.secretStoreRef.name is required when externalSecret.enabled is true. Set externalSecret.secretStoreRef.name to a (Cluster)SecretStore name and externalSecret.secretStoreRef.kind to SecretStore or ClusterSecretStore." }}
{{- end }}
apiVersion: {{ $es.apiVersion | default "external-secrets.io/v1" }}
kind: ExternalSecret
metadata:
  name: {{ include "hyperping-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hyperping-exporter.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $es.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $es.secretStoreRef.name }}
    kind: {{ $es.secretStoreRef.kind | default "SecretStore" }}
  target:
    name: {{ include "hyperping-exporter.fullname" . }}
    creationPolicy: {{ $es.creationPolicy | default "Owner" }}
  data:
    - secretKey: api-key
      remoteRef:
        key: {{ $es.remoteRef.key | required "externalSecret.remoteRef.key is required when externalSecret.enabled is true." }}
        {{- if $es.remoteRef.property }}
        property: {{ $es.remoteRef.property }}
        {{- end }}
        {{- if $es.remoteRef.version }}
        version: {{ $es.remoteRef.version }}
        {{- end }}
{{- end }}
