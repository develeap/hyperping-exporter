config:
  apiKey: x
# A typo in externalSecret.apiVersion (here `v1beata1`) used to render
# verbatim and surface only at apply time as
# `no matches for kind ExternalSecret in version external-secrets.io/v1beata1`.
# validateExternalSecretApiVersion must abort the render with a clear
# message naming the offending value and the allowed set (C-3).
externalSecret:
  enabled: true
  apiVersion: external-secrets.io/v1beata1
  secretStoreRef:
    name: my-store
    kind: SecretStore
  remoteRef:
    key: hyperping/api-key
