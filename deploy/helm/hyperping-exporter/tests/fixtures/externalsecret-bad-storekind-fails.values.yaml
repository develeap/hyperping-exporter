config:
  apiKey: x
# externalSecret.secretStoreRef.kind must be SecretStore or
# ClusterSecretStore. Any other value used to render verbatim and surface
# only at apply time as ESO rejecting the unknown kind.
# validateExternalSecretStoreKind aborts the render here (C-3).
externalSecret:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: BogusStore
  remoteRef:
    key: hyperping/api-key
