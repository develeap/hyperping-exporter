replicaCount: 1

image:
  repository: develeap/hyperping-exporter
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

config:
  # Required: Hyperping API key. Set apiKey or reference an existingSecret.
  apiKey: ""
  # Name of an existing Secret with key 'api-key' (takes precedence over apiKey)
  existingSecret: ""
  cacheTTL: "60s"
  metricsPath: "/metrics"
  logLevel: "info"
  logFormat: "text"
  # Optional: path to web.config.file for TLS / basic auth
  webConfigFile: ""
  # Optional: Prometheus metric name prefix. Defaults to "hyperping" when empty.
  # Changing from the default requires updating any alert rules and Grafana
  # dashboards that reference hardcoded hyperping_* metric names.
  namespace: ""

service:
  type: ClusterIP
  port: 9312
  annotations: {}

serviceMonitor:
  enabled: false
  namespace: ""
  interval: "60s"
  scrapeTimeout: "30s"
  additionalLabels: {}

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65534
  capabilities:
    drop: [ALL]

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false
  # Selectors for pods allowed to scrape metrics (e.g. Prometheus).
  # Override to match your Prometheus labels.
  ingressFrom:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
