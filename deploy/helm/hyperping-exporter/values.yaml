replicaCount: 1

image:
  repository: khaledsalhabdeveleap/hyperping-exporter
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

config:
  # DEVELOPMENT ONLY: Hyperping API key passed inline.
  # WARNING: This value is stored in plaintext in Helm release metadata and
  # visible via `helm get values`. For production, use existingSecret with an
  # externally managed Secret (Sealed Secrets, External Secrets Operator, etc.).
  apiKey: ""
  # Name of an existing Secret with key 'api-key' (recommended for production).
  existingSecret: ""
  cacheTTL: "60s"
  metricsPath: "/metrics"
  logLevel: "info"
  logFormat: "text"
  # Optional: path to web.config.file for TLS / basic auth
  webConfigFile: ""
  # Optional: Prometheus metric name prefix. Defaults to "hyperping" when empty.
  # Changing from the default requires updating any alert rules and Grafana
  # dashboards that reference hardcoded hyperping_* metric names.
  namespace: ""
  # Optional: RE2 regex; monitors whose name matches are excluded from all
  # per-monitor metrics AND tenant aggregates. The chart renders this argument
  # through `toJson`, so any string this YAML file accepts (including
  # backslashes, brackets, and pipes) round-trips unchanged into the container
  # args. Example documented in the project README (see README; transported
  # verbatim by the chart, regex correctness is owned by the README):
  #   excludeNamePattern: '\[DRILL|\[TEST'
  # IMPORTANT for CLI users: Helm's `--set` and `--set-string` flag parsers
  # strip backslashes before any template function sees them. To supply a
  # backslash-bearing value from the CLI, either use a values file
  # (`helm install -f my-values.yaml`) or pass the regex via
  # `--set-file config.excludeNamePattern=path/to/regex.txt` (where the file
  # contains the regex literally, no quoting).
  excludeNamePattern: ""
  # Optional: custom Hyperping MCP server URL. The binary validates the scheme
  # (must start with `https://` or `http://localhost`) at startup; the chart
  # passes the value through unchanged. Leave empty to use the official
  # endpoint (https://api.hyperping.io/v1/mcp).
  mcpUrl: ""

service:
  type: ClusterIP
  port: 9312
  annotations: {}

serviceMonitor:
  enabled: false
  namespace: ""
  interval: "60s"
  scrapeTimeout: "30s"
  additionalLabels: {}

# Resource requests/limits empirically grounded by a 30-minute Docker
# observation on 2026-05-12 against the live Hyperping API. The exporter ran
# with `--read-only --user 65534:65534 --tmpfs /tmp` to match the chart's
# runtime envelope (PSS-restricted; container SecurityContext below). Sample
# data (60 samples at 30s cadence) lives at
# `tests/artifacts/rss-cpu.txt`. Peak RSS observed: 11.47 MiB; peak CPU
# observed: 6.33% (~63 millicores burst during scrape; most samples 0.00%).
# The defaults below carry roughly 30% headroom above the measured peaks for
# request floors and ~4x headroom on limits to absorb GC bursts and tenant
# growth past the measurement window (rounded up to the nearest 10m / 16Mi
# step). Operators with very large tenant footprints should override these.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

podDisruptionBudget:
  enabled: false
  # maxUnavailable is safer than minAvailable when replicaCount=1:
  # minAvailable=1 with 1 replica blocks all voluntary disruptions (node drains).
  maxUnavailable: 1

networkPolicy:
  enabled: false
  # Selectors for pods allowed to scrape metrics (e.g. Prometheus).
  # The default assumes Prometheus is in the SAME namespace as this chart.
  # For cross-namespace scraping, add a namespaceSelector to the entry:
  #   ingressFrom:
  #     - namespaceSelector:
  #         matchLabels:
  #           kubernetes.io/metadata.name: monitoring
  #       podSelector:
  #         matchLabels:
  #           app.kubernetes.io/name: prometheus
  ingressFrom:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
