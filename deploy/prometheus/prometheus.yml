global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: hyperping-monitoring

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/recording-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - alertmanager:9093

scrape_configs:
  - job_name: hyperping-exporter
    scrape_interval: 60s   # Respect the exporter's 60s cache TTL
    scrape_timeout: 30s
    static_configs:
      - targets:
          - hyperping-exporter:9312
    metric_relabel_configs:
      # Drop high-cardinality Go runtime metrics not needed for dashboards.
      - source_labels: [__name__]
        regex: "go_gc_duration_seconds.*"
        action: drop

# To exclude synthetic or drill monitors from all metrics and tenant aggregates,
# pass --exclude-name-pattern to the exporter with a RE2 regex matching their names.
# Example (in docker-compose.yml or your deployment manifest):
#   command: ["--api-key=...", "--exclude-name-pattern=\\[DRILL|\\[TEST|\\[STAGING"]
# Excluded monitors do not appear in hyperping_monitor_* metrics and are not counted
# in hyperping_tenant_monitors_up_ratio or hyperping_tenant_active_outages.
