#   # They are either stale or redundant with the scrape failure alert itself.
#   #
#   # NOTE: equal: [] means a single ExporterScrapeFailure inhibits ALL hyperping
#   # monitor alerts regardless of cluster or instance label. In a multi-cluster
#   # deployment add `equal: [cluster]` (or whichever label scopes your instances)
#   # to prevent one cluster's scrape failure from suppressing alerts from other clusters.
#   - source_matchers:
#       - alertname = "HyperpingExporterScrapeFailure"
#     target_matchers:
#       - alertname =~ "HyperpingMonitor.*|HyperpingHealthcheck.*|HyperpingTenant.*|HyperpingSSL.*"
#     equal: []
#     # Multi-cluster example: equal: [cluster]
#
#   # HyperpingTenantHealthCritical (score < 60) inhibits HyperpingTenantHealthDegraded (score < 80)
#   # to avoid duplicate pages for the same condition.
