groups:
  - name: hyperping_monitor_availability
    interval: 1m
    rules:
      # `unless on(uuid) hyperping_monitor_in_maintenance == 1` suppresses the
      # alert for monitors covered by an active maintenance window. The exporter
      # always emits hyperping_monitor_in_maintenance per monitor (0 when no
      # window is active), so the join is always evaluable.
      - alert: HyperpingMonitorDown
        expr: |
          (hyperping_monitor_up == 0 and hyperping_monitor_paused == 0)
          unless on(uuid) hyperping_monitor_in_maintenance == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Monitor {{ $labels.name }} is DOWN"
          description: "Monitor {{ $labels.name }} ({{ $labels.uuid }}) has been down for more than 2 minutes."
          runbook: "https://wiki.internal/runbooks/hyperping-monitor-down"

      - alert: HyperpingMonitorActiveOutage
        expr: |
          hyperping_monitor_outage_active == 1
          unless on(uuid) hyperping_monitor_in_maintenance == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Active outage on {{ $labels.name }}"
          description: >-
            Monitor {{ $labels.name }} ({{ $labels.uuid }}) has had an active unresolved outage
            for at least 1 minute. Check hyperping_monitor_active_outage_status_code for the
            HTTP status code.

      # Fires when more than 10% of monitored endpoints are simultaneously down.
      # Fleet-size-aware: 10% of 10 monitors = 1, 10% of 100 monitors = 10.
      # The `and hyperping_monitors > 0` guard prevents +Inf from being
      # evaluated (division-by-zero) if the monitor list is momentarily empty.
      - alert: HyperpingMultipleActiveOutages
        expr: |
          hyperping_tenant_active_outages / hyperping_monitors > 0.1
          and hyperping_monitors > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $value | humanizePercentage }} of monitors have concurrent active outages"
          description: >-
            {{ $value | humanizePercentage }} of monitors are currently experiencing active outages.
            This may indicate a shared infrastructure issue. Check OPS-38 dashboard.

      - alert: HyperpingCoreMonitorDown
        # tier label is carried directly on hyperping_monitor_up since EXP-01.
        # No join needed; filter tier="core" inline. Maintenance suppression
        # uses on(uuid) because the join target lacks the tier= filter.
        expr: |
          hyperping_monitor_up{tier="core"} == 0
          unless on(uuid) hyperping_monitor_in_maintenance == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CORE monitor {{ $labels.name }} is DOWN"
          description: "Core (escalated) monitor {{ $labels.name }} ({{ $labels.uuid }}) is down. Escalation policy should trigger."

      # Fires when the exporter successfully connects to the API but reports no monitors.
      # Usually indicates all monitors were deleted or an account/API-key mismatch.
      - alert: HyperpingNoMonitors
        expr: hyperping_monitors == 0 and hyperping_scrape_success == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No monitors reported by Hyperping"
          description: >-
            The exporter is successfully scraping the Hyperping API but reports zero monitors.
            This may indicate a configuration issue, all monitors were deleted, or the API key
            belongs to an account with no monitors. If using --exclude-name-pattern, verify the
            pattern is not matching all monitors.

  - name: hyperping_operations
    interval: 5m
    rules:
      # Open (non-resolved) Hyperping incidents. Triages to the team that owns
      # the affected services — the alert is informational, not actionable until
      # someone confirms the root cause.
      - alert: HyperpingOpenIncidents
        expr: hyperping_incidents_open > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value | humanize }} open Hyperping incident(s)"
          description: >-
            There are {{ $value | humanize }} unresolved incidents on the Hyperping account.
            Visit the Hyperping dashboard to triage.

      # Fires when a monitor is down in some regions but up in others. Indicates
      # a regional infrastructure issue (e.g., one cloud region) rather than a
      # complete service outage. Requires monitors configured with multiple regions.
      - alert: HyperpingMonitorRegionalOutage
        expr: |
          count by (uuid, name, tenant, tier) (hyperping_monitor_up_by_region == 0) > 0
          and
          count by (uuid, name, tenant, tier) (hyperping_monitor_up_by_region == 1) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Regional outage detected for {{ $labels.name }}"
          description: >-
            Monitor {{ $labels.name }} ({{ $labels.uuid }}) is down in some regions but
            up in others — likely a regional infrastructure issue rather than a complete
            outage. Check hyperping_monitor_up_by_region to identify the affected regions.

  # MCP-derived alerts. These require --mcp-url to be configured on the exporter;
  # without MCP the source metrics are not emitted and the alerts are silently
  # dormant (no series → no eval → no fire), which is the correct behaviour.
  - name: hyperping_mcp
    interval: 5m
    rules:
      - alert: HyperpingMonitorAnomalyHigh
        expr: hyperping_monitor_anomaly_score > 0.8
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Anomalous behavior on {{ $labels.name }}"
          # printf "%.2f" instead of `humanize` because humanize formats a 0..1
          # score with SI prefixes (e.g. 0.95 → "950m"), which obscures intent.
          description: >-
            Monitor {{ $labels.name }} ({{ $labels.uuid }}) has a sustained anomaly score
            of {{ $value | printf "%.2f" }} (threshold: 0.80). Check response time trends and
            recent outage patterns.

      # MTTA in seconds. 600s = 10 minutes is a generous default; tighten for
      # services that page and need faster acknowledgement.
      - alert: HyperpingMonitorMTTAHigh
        expr: hyperping_monitor_mtta_seconds > 600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "High MTTA on {{ $labels.name }}"
          description: >-
            Monitor {{ $labels.name }} ({{ $labels.uuid }}) mean time-to-acknowledge is
            {{ $value | humanizeDuration }} (threshold: 10m). On-call response may need
            attention.

  - name: hyperping_monitor_ssl
    interval: 1h
    rules:
      - alert: HyperpingSSLExpiryWarning
        expr: hyperping_monitor_ssl_expiration_days < 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate for {{ $labels.name }} expires in {{ $value | humanize }} days"
          description: >-
            The SSL certificate for monitor {{ $labels.name }} ({{ $labels.uuid }})
            expires in {{ $value | humanize }} days. Renew before it hits 7 days.

      - alert: HyperpingSSLExpiryCritical
        expr: hyperping_monitor_ssl_expiration_days < 3
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "SSL certificate for {{ $labels.name }} expires in {{ $value | humanize }} days — URGENT"
          description: >-
            The SSL certificate for monitor {{ $labels.name }} expires in under 3 days.
            Immediate renewal required.

  - name: hyperping_sla
    interval: 5m
    rules:
      - alert: HyperpingMonitorSLABreach24h
        expr: hyperping_monitor_sla_ratio{period="24h"} < 0.99
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.name }} SLA below 99% over last 24h ({{ $value | humanizePercentage }})"
          description: >-
            Monitor {{ $labels.name }} 24-hour SLA is {{ $value | humanizePercentage }},
            below the 99% threshold.

      - alert: HyperpingMonitorSLABreach7d
        expr: hyperping_monitor_sla_ratio{period="7d"} < 0.995
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.name }} 7-day SLA below 99.5% ({{ $value | humanizePercentage }})"
          description: >-
            Monitor {{ $labels.name }} 7-day SLA is {{ $value | humanizePercentage }},
            below the 99.5% target.

      - alert: HyperpingTenantSLADegraded
        expr: hyperping_tenant_avg_sla_ratio{period="24h"} < 0.95
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Fleet-wide 24h average SLA below 95% ({{ $value | humanizePercentage }})"
          description: >-
            The average SLA across all monitors has dropped below 95% over the last 24 hours.
            This may indicate a widespread infrastructure issue.

  - name: hyperping_healthchecks
    interval: 1m
    rules:
      - alert: HyperpingHealthcheckDown
        expr: hyperping_healthcheck_up == 0 and hyperping_healthcheck_paused == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Healthcheck {{ $labels.name }} has not pinged"
          description: >-
            Healthcheck {{ $labels.name }} ({{ $labels.uuid }}) has not pinged within
            its expected period for more than 5 minutes. Check if the associated cron job is running.

  - name: hyperping_tenant_health
    interval: 2m
    rules:
      - alert: HyperpingTenantHealthDegraded
        expr: hyperping_tenant_health_score < 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Tenant health score degraded: {{ $value | humanize }}/100"
          description: >-
            The composite tenant health score has dropped to {{ $value | humanize }}.
            Check the Fleet Overview dashboard for details.

      - alert: HyperpingTenantHealthCritical
        expr: hyperping_tenant_health_score < 60
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Tenant health score critical: {{ $value | humanize }}/100"
          description: >-
            The composite tenant health score has dropped to {{ $value | humanize }},
            indicating severe service degradation.

  - name: hyperping_exporter
    interval: 1m
    rules:
      - alert: HyperpingExporterScrapeFailure
        expr: hyperping_scrape_success == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Hyperping exporter cannot reach the API"
          description: >-
            The hyperping-exporter has failed to scrape the Hyperping API for 5+ minutes.
            Metrics are stale. Check API key validity and network connectivity.

      # Threshold is 2x the configured cache TTL, read directly from the exporter.
      # This automatically adapts when --cache-ttl is changed; no manual threshold update needed.
      - alert: HyperpingDataStale
        expr: hyperping_data_age_seconds > (2 * hyperping_cache_ttl_seconds)
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Hyperping metrics data is stale ({{ $value | humanizeDuration }} old)"
          description: >-
            The hyperping-exporter cache has not been refreshed in {{ $value | humanizeDuration }}.
            The exporter may be stalled. Restart if the issue persists.

# Alertmanager inhibition rules (add to your alertmanager.yml):
#
# inhibit_rules:
