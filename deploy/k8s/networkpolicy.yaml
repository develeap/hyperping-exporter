apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hyperping-exporter
  namespace: monitoring
  labels:
    app: hyperping-exporter
spec:
  podSelector:
    matchLabels:
      app: hyperping-exporter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape metrics on port 9312.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9312
  egress:
    # Allow DNS resolution.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to Hyperping API.
    - ports:
        - protocol: TCP
          port: 443
