apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperping-exporter
  namespace: monitoring
  labels:
    app: hyperping-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hyperping-exporter
  template:
    metadata:
      labels:
        app: hyperping-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9312"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hyperping-exporter
          # Replace <VERSION> with a published tag from
          # https://github.com/develeap/hyperping-exporter/releases (e.g. v1.3.1).
          # The example manifest deliberately does NOT default to :latest so that
          # an unmodified `kubectl apply -f` will fail loudly rather than pull a
          # surprise upgrade on every rollout.
          image: khaledsalhabdeveleap/hyperping-exporter:<VERSION>
          args:
            - "--cache-ttl=60s"
            - "--log-format=json"
          env:
            - name: HYPERPING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hyperping-credentials
                  key: api-key
          ports:
            - name: metrics
              containerPort: 9312
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      terminationGracePeriodSeconds: 15
