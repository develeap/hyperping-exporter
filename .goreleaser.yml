version: 2

project_name: hyperping-exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: hyperping-exporter
    main: .
    binary: hyperping-exporter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
      - -X main.revision={{.FullCommit}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers:
  - image_templates:
      - "ghcr.io/develeap/hyperping-exporter:{{ .Version }}-amd64"
    use: buildx
    ids: [hyperping-exporter]
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.description=Prometheus exporter for Hyperping monitoring"
  - image_templates:
      - "ghcr.io/develeap/hyperping-exporter:{{ .Version }}-arm64"
    use: buildx
    ids: [hyperping-exporter]
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.description=Prometheus exporter for Hyperping monitoring"

docker_manifests:
  - name_template: "ghcr.io/develeap/hyperping-exporter:{{ .Version }}"
    image_templates:
      - "ghcr.io/develeap/hyperping-exporter:{{ .Version }}-amd64"
      - "ghcr.io/develeap/hyperping-exporter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/develeap/hyperping-exporter:latest"
    image_templates:
      - "ghcr.io/develeap/hyperping-exporter:{{ .Version }}-amd64"
      - "ghcr.io/develeap/hyperping-exporter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/develeap/hyperping-exporter:v{{ .Major }}"
    image_templates:
      - "ghcr.io/develeap/hyperping-exporter:{{ .Version }}-amd64"
      - "ghcr.io/develeap/hyperping-exporter:{{ .Version }}-arm64"

