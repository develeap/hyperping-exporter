version: 2

project_name: hyperping-exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: hyperping-exporter
    main: .
    binary: hyperping-exporter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "6"
      - "7"
    ignore:
      - { goos: darwin, goarch: "386" }
      - { goos: darwin, goarch: arm }
      - { goos: windows, goarch: arm64 }
      - { goos: windows, goarch: arm }
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
      - -X main.revision={{.FullCommit}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers_v2:
  - dockerfile: Dockerfile.goreleaser
    ids:
      - hyperping-exporter
    images:
      - "{{ .Env.DOCKER_IMAGE }}"
    tags:
      - "{{ .Version }}"
      - "v{{ .Major }}"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true
    labels:
      "org.opencontainers.image.title":       "{{ .ProjectName }}"
      "org.opencontainers.image.version":     "{{ .Version }}"
      "org.opencontainers.image.source":      "{{ .GitURL }}"
      "org.opencontainers.image.created":     "{{ .Date }}"
      "org.opencontainers.image.revision":    "{{ .FullCommit }}"
      "org.opencontainers.image.description": "Prometheus exporter for Hyperping monitoring"

