name: Chart Release

# Cuts a Helm chart release on `chart-v*` tags.
#
# Disjoint from `release.yml` (which fires on `v*` and ships the Go binary).
# A chart-v1.5.0 tag triggers ONLY this workflow; no Docker images are built
# or republished. Operators install with:
#
#   helm repo add develeap https://develeap.github.io/hyperping-exporter
#   helm repo update
#   helm install foo develeap/hyperping-exporter --version 1.5.0
#
# Publishes the chart .tgz + index.yaml to the `gh-pages` branch (served by
# GitHub Pages). Switched from OCI on GHCR because the org policy disables
# per-package visibility changes, which would leave the OCI artifact private.
#
# Release-time gates (re-run independently of branch CI, so a defect that
# slipped past main does not ship to operators):
#   - tag <-> Chart.yaml version match
#   - tag commit reachable from origin/main (no tagging from feature branches)
#   - helm dependency build (cheap insurance against silently broken artifacts)
#   - helm lint --strict
#   - render_test.py
#   - kubeconform schema validation
#   - CHANGELOG entry MUST exist for the tag version (no fallback)
#
# Prerequisites (one-time per repo):
#   - Enable GitHub Pages: Settings -> Pages -> Source: "Deploy from a branch",
#     Branch: gh-pages, Folder: / (root). The first workflow run creates the
#     branch if it does not exist; enable Pages AFTER the first successful run
#     or accept that the URL 404s until then.

on:
  push:
    tags:
      - 'chart-v*'

permissions:
  contents: write   # create GitHub Release AND push to gh-pages branch

concurrency:
  # Serialize concurrent runs on the same tag ref so re-runs do not race on
  # the gh-pages push or the GitHub Release creation. cancel-in-progress:
  # false because a half-finished release (gh-pages updated but no Release
  # created) is worse than a queued retry; let the running job complete.
  group: chart-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CHART_DIR: deploy/helm/hyperping-exporter
  CHART_NAME: hyperping-exporter
  KUBECONFORM_VERSION: v0.7.0

jobs:
  release:
    name: Package and publish chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag commit is reachable from origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" refs/remotes/origin/main; then
            echo "::error::tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is not reachable from origin/main. Refusing to publish a chart release from a non-main commit."
            exit 1
          fi

      - name: Verify tag matches Chart.yaml version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"                  # e.g. chart-v1.5.0
          TAG_VERSION="${TAG#chart-v}"              # e.g. 1.5.0
          CHART_VERSION=$(awk '/^version:/ {print $2; exit}' "${CHART_DIR}/Chart.yaml")
          echo "tag=${TAG_VERSION}  Chart.yaml=${CHART_VERSION}"
          if [ "${TAG_VERSION}" != "${CHART_VERSION}" ]; then
            echo "::error::tag ${TAG} implies chart version ${TAG_VERSION}, but Chart.yaml is ${CHART_VERSION}"
            exit 1
          fi
          echo "CHART_VERSION=${CHART_VERSION}" >> "${GITHUB_ENV}"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.20.2

      - name: Helm dependency build
        run: helm dependency build "${CHART_DIR}"

      - name: Helm lint (strict)
        run: helm lint --strict "${CHART_DIR}"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: python -m pip install --no-cache-dir 'pyyaml==6.0.3'

      - name: Render tests
        run: python3 "${CHART_DIR}/tests/render_test.py"

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Kubeconform schema validation
        run: make helm-kubeconform

      - name: Package chart
        id: package
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package "${CHART_DIR}" -d dist
          PKG="dist/${CHART_NAME}-${CHART_VERSION}.tgz"
          if [ ! -f "${PKG}" ]; then
            echo "::error::expected package ${PKG} not produced"
            exit 1
          fi
          # Absolute path so subsequent worktree-cd does not break the ref.
          ABS_PKG="$(cd "$(dirname "${PKG}")" && pwd)/$(basename "${PKG}")"
          echo "package=${PKG}" >> "${GITHUB_OUTPUT}"
          echo "abs_package=${ABS_PKG}" >> "${GITHUB_OUTPUT}"

      - name: Compute Pages URL
        id: pages
        run: |
          set -euo pipefail
          OWNER_LC=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(printf '%s' "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          PAGES_URL="https://${OWNER_LC}.github.io/${REPO_LC}"
          echo "url=${PAGES_URL}" >> "${GITHUB_OUTPUT}"
          echo "Pages URL: ${PAGES_URL}"

      - name: Extract release notes from CHANGELOG
        env:
          PAGES_URL: ${{ steps.pages.outputs.url }}
        run: |
          set -euo pipefail
          # Pulls the section between `## [<version>] ...` and the next `## [` heading.
          awk -v ver="${CHART_VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/      { exit }
            capture                  { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no CHANGELOG entry found for chart version ${CHART_VERSION}. Add a '## [${CHART_VERSION}]' section to CHANGELOG.md before tagging."
            exit 1
          fi
          {
            echo ""
            echo "## Install"
            echo ""
            echo '```sh'
            echo "helm repo add develeap ${PAGES_URL}"
            echo "helm repo update"
            echo "helm install hyperping-exporter develeap/${CHART_NAME} \\"
            echo "  --version ${CHART_VERSION}"
            echo '```'
          } >> release-notes.md

      - name: Publish to gh-pages
        env:
          PAGES_URL: ${{ steps.pages.outputs.url }}
          ABS_PKG: ${{ steps.package.outputs.abs_package }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          GH_PAGES_DIR="${RUNNER_TEMP}/gh-pages-wt"

          # Separate "branch exists on remote?" from "fetch succeeded?" so a
          # transient fetch failure does not silently fall through to orphan
          # creation. ls-remote --exit-code returns 2 when the ref is absent;
          # anything else (0 = found, 1+ = error) is handled distinctly.
          if git ls-remote --exit-code origin refs/heads/gh-pages >/dev/null 2>&1; then
            echo "gh-pages exists on remote; fetching."
            git fetch origin gh-pages
            git worktree add "${GH_PAGES_DIR}" FETCH_HEAD
            (cd "${GH_PAGES_DIR}" && git checkout -B gh-pages)
          else
            echo "gh-pages does not exist on remote; creating orphan branch."
            mkdir -p "${GH_PAGES_DIR}"
            git worktree add --detach "${GH_PAGES_DIR}" HEAD
            (cd "${GH_PAGES_DIR}" && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true)
          fi

          cp "${ABS_PKG}" "${GH_PAGES_DIR}/"

          cd "${GH_PAGES_DIR}"
          if [ -f index.yaml ]; then
            helm repo index --merge index.yaml --url "${PAGES_URL}" .
          else
            helm repo index --url "${PAGES_URL}" .
            # Seed an index.html so Pages serves something at the root URL.
            cat > index.html <<HTML
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>develeap helm charts</title></head>
          <body>
          <h1>develeap helm charts</h1>
          <p>Add this Helm repository:</p>
          <pre>helm repo add develeap ${PAGES_URL}
          helm repo update</pre>
          <p>Index: <a href="${PAGES_URL}/index.yaml">index.yaml</a></p>
          </body></html>
          HTML
          fi

          git add -A
          # No-op when re-running on the same tag with identical contents.
          if git diff --cached --quiet; then
            echo "gh-pages: nothing to commit (idempotent re-run)."
          else
            git commit -m "chart-${CHART_VERSION}"
            git push origin gh-pages
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # gh release create exits non-zero if the release already exists;
          # treat that as success after uploading the asset to the existing
          # release. Keeps the workflow idempotent on tag re-runs.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; uploading asset (--clobber)."
            gh release upload "${GITHUB_REF_NAME}" \
              "${{ steps.package.outputs.package }}" --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Chart ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "Chart ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              "${{ steps.package.outputs.package }}"
          fi
