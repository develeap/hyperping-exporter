name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'deploy/grafana/**'
      - 'deploy/prometheus/**'
      - 'deploy/helm/**'
      - 'deploy/k8s/**'
      - 'LICENSE'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'deploy/grafana/**'
      - 'deploy/prometheus/**'
      - 'deploy/helm/**'
      - 'deploy/k8s/**'
      - 'LICENSE'
      - 'CHANGELOG.md'

permissions:
  contents: read

jobs:
  verify:
    name: Verify module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache: true
      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out -coverpkg=./internal/... ./...
      - name: Enforce 90% coverage threshold
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,""); print $3}')
          echo "Coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 90) { print "FAIL: coverage " p "% is below 90%"; exit 1 } }'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache: true
      # Install from source so the binary is compiled with Go 1.26,
      # which allows it to analyse go 1.26.x modules without the
      # "go version used to build golangci-lint is lower" error.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run golangci-lint
        run: golangci-lint run ./...

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
      - name: License compliance
        run: |
          go mod download
          FAIL=0
          for dir in $(go list -m -f '{{.Dir}}' all 2>/dev/null | grep -v '^$'); do
            for f in "$dir/LICENSE" "$dir/LICENCE" "$dir/LICENSE.md" "$dir/LICENCE.md" "$dir/LICENSE.txt" "$dir/COPYING"; do
              if [ -f "$f" ] && grep -qliE 'GNU GENERAL PUBLIC LICENSE.*Version 3|GNU AFFERO|SSPL|EUPL' "$f" 2>/dev/null; then
                echo "FAIL: copyleft license detected in $f"
                FAIL=1
              fi
            done
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: no copyleft licenses in dependencies"

  cross-compile:
    name: Cross-compile check
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        include:
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: "386" }
          - { goos: linux,   goarch: arm,  goarm: "7" }
          - { goos: linux,   goarch: arm,  goarm: "6" }
          - { goos: linux,   goarch: "386" }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache: true
      - name: Cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o /dev/null .

  docker:
    name: Docker build & scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache: true
      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux go build -trimpath -ldflags="-s -w" -o hyperping-exporter .
      - run: docker build -t hyperping-exporter:ci .
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: hyperping-exporter:ci
          exit-code: 1
          severity: CRITICAL,HIGH
          format: table
      - name: Report Docker build status
        if: always()
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state=${{ job.status == 'success' && 'success' || 'failure' }} \
            -f context="Docker build" \
            -f description="Docker build & scan ${{ job.status }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
