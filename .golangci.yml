version: "2"

linters:
  default: standard
  enable:
    - gosec
    - gocritic

  settings:
    govet:
      enable:
        - nilness
    gocritic:
      # ifElseChain: the existing fetchMcpData per-fetch blocks intentionally
      # use if / else if ctx.Err() != nil { return } / else if err != nil { log }
      # to short-circuit on cancellation; rewriting to switch obscures that.
      disabled-checks:
        - ifElseChain

  exclusions:
    rules:
      # errcheck in test files: cleanup defers and test-server writes
      # are intentionally fire-and-forget.
      - path: _test\.go
        linters:
          - errcheck
      # Unused struct fields in test helpers are acceptable.
      - path: _test\.go
        linters:
          - unused
      # G104/G307: best-effort Close() calls in deferred cleanup are intentional.
      - linters:
          - gosec
        text: "G(104|307)"
      # G304: file path variables in tests are controlled (VCR cassette paths).
      - path: _test\.go
        linters:
          - gosec
        text: "G304"
